<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>html-overlay-node — Hybrid Canvas + HTML Visual Node Editor</title>

    <!-- SEO -->
    <meta name="description" content="html-overlay-node: a zero-dependency visual node editor that pairs Canvas performance with full HTML/CSS widgets. Build data-flow graphs, workflow editors, and visual-scripting tools in vanilla JS." />
    <meta name="keywords" content="visual node editor, canvas node editor, data flow graph, workflow editor, visual programming, flow-based programming, node graph library, html overlay, zero dependencies, litegraph alternative, rete alternative, javascript node editor" />
    <meta name="author" content="cheonghakim" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cheonghakim.github.io/HTML-overlay-node/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="html-overlay-node — Hybrid Canvas + HTML Visual Node Editor" />
    <meta property="og:description" content="Zero-dependency visual node editor. Canvas-speed rendering + full HTML/CSS widgets. Undo/redo, minimap, sub-graphs, TypeScript declarations included." />
    <meta property="og:url" content="https://cheonghakim.github.io/HTML-overlay-node/" />
    <meta property="og:site_name" content="html-overlay-node" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="html-overlay-node — Visual Node Editor" />
    <meta name="twitter:description" content="Zero-dependency visual node editor. Canvas rendering + HTML overlay widgets. Undo/redo, minimap, TypeScript support." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "html-overlay-node",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "description": "A zero-dependency visual node editor library that combines Canvas rendering performance with full HTML/CSS widget support for building data-flow graphs and workflow editors.",
      "url": "https://cheonghakim.github.io/HTML-overlay-node/",
      "downloadUrl": "https://www.npmjs.com/package/html-overlay-node",
      "codeRepository": "https://github.com/cheonghakim/html-overlay-node",
      "author": { "@type": "Person", "name": "cheonghakim" },
      "license": "https://opensource.org/licenses/MIT",
      "programmingLanguage": "JavaScript",
      "softwareVersion": "0.3.2"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./src/ui/PropertyPanel.css" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="icon" href="/img/favicon.svg" />
  </head>

  <body>
    <div id="wrap">
      <main class="content-root" id="graph-editor">
        <div id="toolbar">
          <!-- File operations -->
          <button id="saveBtn" title="Save graph as JSON (Ctrl+S)">Save</button>
          <button id="loadBtn" title="Load graph from JSON">Load</button>

          <div class="toolbar-sep"></div>

          <!-- Edge style -->
          <label>
            <span style="color: var(--color-text-disabled); font-size: 10px">Edges</span>
            <select id="edgeStyleSelector">
              <option value="bezier">Curved</option>
              <option value="orthogonal" selected>Orthogonal</option>
              <option value="line">Straight</option>
            </select>
          </label>

          <div class="toolbar-sep"></div>

          <!-- Execution mode -->
          <div class="mode-toggle" id="modeToggle">
            <button class="active" data-mode="run" title="Run — execute all nodes continuously">
              Run
            </button>
            <button data-mode="step" title="Step — execute one step at a time">Step</button>
          </div>

          <div class="toolbar-sep"></div>

          <!-- View controls -->
          <button
            id="fitBtn"
            title="Fit all nodes into view (F)"
            style="font-size: 12px; padding: 3px 8px"
          >
            Fit
          </button>
          <div class="zoom-controls">
            <button id="zoomInBtn" title="Zoom in">+</button>
            <button id="zoomOutBtn" title="Zoom out">−</button>
          </div>

          <div class="toolbar-sep"></div>

          <!-- Snap indicator -->
          <div class="indicator" id="snapIndicator" title="Toggle with G key">Snap</div>
        </div>
      </main>
    </div>

    <script type="module">
      import { createGraphEditor } from "./src/index.js";
      import { registerAllNodes } from "./src/nodes/index.js";

      const editor = createGraphEditor("#graph-editor", {
        theme: "dark",
        autorun: false,
        showMinimap: true,
        enablePropertyPanel: true,
        enableHelp: true,
      });

      window.editor = editor;

      registerAllNodes(editor.registry, editor.hooks);

      // ── Edge style ──────────────────────────────────────────────
      document.getElementById("edgeStyleSelector").addEventListener("change", (e) => {
        editor.setEdgeStyle(e.target.value);
        editor.render();
      });

      // ── Execution mode ──────────────────────────────────────────
      const modeToggle = document.getElementById("modeToggle");
      modeToggle?.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const mode = btn.dataset.mode;
        editor.setExecutionMode(mode);
        modeToggle.querySelectorAll("button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });

      // ── Snap indicator ──────────────────────────────────────────
      const snapIndicator = document.getElementById("snapIndicator");

      function updateSnapIndicator() {
        if (!editor.controller) return;
        const on = editor.controller.snapToGrid;
        snapIndicator.textContent = on ? "Snap ON" : "Snap";
        snapIndicator.classList.toggle("active", on);
      }

      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "g" && !e.ctrlKey && !e.metaKey) {
          setTimeout(updateSnapIndicator, 10);
        }
      });

      // Patch render to sync snap indicator
      const _origRender = editor.render.bind(editor);
      editor.render = function () {
        _origRender();
        updateSnapIndicator();
      };

      // ── Fit to View ─────────────────────────────────────────────
      document.getElementById("fitBtn").addEventListener("click", () => {
        editor.controller?.fitToView();
      });

      // Ctrl+S shortcut for save
      window.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
          e.preventDefault();
          document.getElementById("saveBtn").click();
        }
      });

      // ── Zoom buttons ────────────────────────────────────────────
      document.getElementById("zoomInBtn").addEventListener("click", () => {
        const r = editor.renderer;
        const cx = r.canvas.width / 2;
        const cy = r.canvas.height / 2;
        r.zoomAt(1.2, cx, cy);
        editor.render();
      });

      document.getElementById("zoomOutBtn").addEventListener("click", () => {
        const r = editor.renderer;
        const cx = r.canvas.width / 2;
        const cy = r.canvas.height / 2;
        r.zoomAt(1 / 1.2, cx, cy);
        editor.render();
      });

      // ── Save / Load ─────────────────────────────────────────────
      document.getElementById("saveBtn").addEventListener("click", () => {
        const saved = editor.graph.toJSON();
        const blob = new Blob([JSON.stringify(saved, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "graph.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      document.getElementById("loadBtn").addEventListener("click", () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              editor.subNodePanel?.close();
              editor.graph.fromJSON(JSON.parse(ev.target.result));
              if (editor.htmlOverlay) editor.htmlOverlay.clear();
              requestAnimationFrame(() => {
                editor.controller?.fitToView({ padding: 80, maxScale: 1.5 });
                editor.render();
              });
            } catch (err) {
              console.error(err);
              alert("Failed to load file. Please check the JSON format.");
            }
          };
          reader.readAsText(file);
        });
        input.click();
      });

      // ── Initial load ────────────────────────────────────────────
      async function loadExample() {
        try {
          const exampleUrl = `${import.meta.env.BASE_URL}example.json`;
          const res = await fetch(exampleUrl);
          if (!res.ok) throw new Error("no example.json");
          const json = await res.json();
          editor.graph.fromJSON(json);

          // Frame 1: open sub-panel so mainArea shrinks before fitToView.
          // Frame 2: ResizeObserver has updated canvas dimensions → fitToView
          // uses the correct (reduced) height and centers nodes in visible area.
          requestAnimationFrame(() => {
            try {
              const sgNode = editor.graph.nodes.get("n-sg");
              if (sgNode && editor.subNodePanel) {
                editor.subNodePanel.open(sgNode, sgNode.state.subGraphData, [
                  "메인 그래프",
                  sgNode.title,
                ]);
              }
            } catch (err) {
              console.warn("[loadExample] sub-panel open failed:", err);
            }
            requestAnimationFrame(() => {
              editor.controller?.fitToView({ padding: 80, maxScale: 1.0 });
              updateSnapIndicator();
            });
          });
        } catch (err) {
          if (err.message !== "no example.json") {
            console.warn("[loadExample] failed to load example.json:", err);
          }
          editor.render();
          updateSnapIndicator();
        }
      }

      loadExample();
    </script>
  </body>
</html>
