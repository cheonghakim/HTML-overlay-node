<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Free Node — Graph Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./src/ui/PropertyPanel.css" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="icon" href="/img/favicon.svg" />
  </head>

  <body>
    <div id="wrap">
      <main class="content-root" id="graph-editor">
        <div id="toolbar">
          <!-- File operations -->
          <button id="saveBtn" title="Save graph as JSON (Ctrl+S)">Save</button>
          <button id="loadBtn" title="Load graph from JSON">Load</button>

          <div class="toolbar-sep"></div>

          <!-- Edge style -->
          <label>
            <span style="color: var(--color-text-disabled); font-size: 10px">Edges</span>
            <select id="edgeStyleSelector">
              <option value="bezier">Curved</option>
              <option value="orthogonal" selected>Orthogonal</option>
              <option value="line">Straight</option>
            </select>
          </label>

          <div class="toolbar-sep"></div>

          <!-- Execution mode -->
          <div class="mode-toggle" id="modeToggle">
            <button class="active" data-mode="run" title="Run — execute all nodes continuously">
              Run
            </button>
            <button data-mode="step" title="Step — execute one step at a time">Step</button>
          </div>

          <div class="toolbar-sep"></div>

          <!-- View controls -->
          <button
            id="fitBtn"
            title="Fit all nodes into view (F)"
            style="font-size: 12px; padding: 3px 8px"
          >
            Fit
          </button>
          <div class="zoom-controls">
            <button id="zoomInBtn" title="Zoom in">+</button>
            <button id="zoomOutBtn" title="Zoom out">−</button>
          </div>

          <div class="toolbar-sep"></div>

          <!-- Snap indicator -->
          <div class="indicator" id="snapIndicator" title="Toggle with G key">Snap</div>
        </div>
      </main>
    </div>

    <script type="module">
      import { createGraphEditor } from "./src/index.js";
      import { registerAllNodes } from "./src/nodes/index.js";

      const editor = createGraphEditor("#graph-editor", {
        theme: "dark",
        autorun: false,
        showMinimap: true,
        enablePropertyPanel: true,
        enableHelp: true,
      });

      window.editor = editor;

      registerAllNodes(editor.registry, editor.hooks);

      // ── Edge style ──────────────────────────────────────────────
      document.getElementById("edgeStyleSelector").addEventListener("change", (e) => {
        editor.setEdgeStyle(e.target.value);
        editor.render();
      });

      // ── Execution mode ──────────────────────────────────────────
      const modeToggle = document.getElementById("modeToggle");
      modeToggle?.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const mode = btn.dataset.mode;
        editor.setExecutionMode(mode);
        modeToggle.querySelectorAll("button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });

      // ── Snap indicator ──────────────────────────────────────────
      const snapIndicator = document.getElementById("snapIndicator");

      function updateSnapIndicator() {
        if (!editor.controller) return;
        const on = editor.controller.snapToGrid;
        snapIndicator.textContent = on ? "Snap ON" : "Snap";
        snapIndicator.classList.toggle("active", on);
      }

      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "g" && !e.ctrlKey && !e.metaKey) {
          setTimeout(updateSnapIndicator, 10);
        }
      });

      // Patch render to sync snap indicator
      const _origRender = editor.render.bind(editor);
      editor.render = function () {
        _origRender();
        updateSnapIndicator();
      };

      // ── Fit to View ─────────────────────────────────────────────
      document.getElementById("fitBtn").addEventListener("click", () => {
        editor.controller?.fitToView();
      });

      // Ctrl+S shortcut for save
      window.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
          e.preventDefault();
          document.getElementById("saveBtn").click();
        }
      });

      // ── Zoom buttons ────────────────────────────────────────────
      document.getElementById("zoomInBtn").addEventListener("click", () => {
        const r = editor.renderer;
        const cx = r.canvas.width / 2;
        const cy = r.canvas.height / 2;
        r.zoomAt(1.2, cx, cy);
        editor.render();
      });

      document.getElementById("zoomOutBtn").addEventListener("click", () => {
        const r = editor.renderer;
        const cx = r.canvas.width / 2;
        const cy = r.canvas.height / 2;
        r.zoomAt(1 / 1.2, cx, cy);
        editor.render();
      });

      // ── Save / Load ─────────────────────────────────────────────
      document.getElementById("saveBtn").addEventListener("click", () => {
        const saved = editor.graph.toJSON();
        const blob = new Blob([JSON.stringify(saved, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "graph.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      document.getElementById("loadBtn").addEventListener("click", () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              editor.subNodePanel?.close();
              editor.graph.fromJSON(JSON.parse(ev.target.result));
              if (editor.htmlOverlay) editor.htmlOverlay.clear();
              requestAnimationFrame(() => {
                editor.controller?.fitToView({ padding: 80, maxScale: 1.5 });
                editor.render();
              });
            } catch (err) {
              console.error(err);
              alert("Failed to load file. Please check the JSON format.");
            }
          };
          reader.readAsText(file);
        });
        input.click();
      });

      // ── Initial load ────────────────────────────────────────────
      async function loadExample() {
        try {
          const exampleUrl = `${import.meta.env.BASE_URL}example.json`;
          const res = await fetch(exampleUrl);
          if (!res.ok) throw new Error("no example.json");
          const json = await res.json();
          editor.graph.fromJSON(json);

          // Defer render to next frame so ResizeObserver has settled the canvas
          // dimensions before we draw (canvas starts at 0×0 on first paint).
          requestAnimationFrame(() => {
            editor.controller?.fitToView({ padding: 140, maxScale: 0.95 });
            editor.render();
            updateSnapIndicator();
            try {
              const sgNode = editor.graph.nodes.get("n-sg");
              if (sgNode && editor.subNodePanel) {
                editor.subNodePanel.open(sgNode, sgNode.state.subGraphData, ["메인 그래프", sgNode.title]);
              }
            } catch (err) {
              console.warn("[loadExample] sub-panel open failed:", err);
            }
          });
        } catch (err) {
          if (err.message !== "no example.json") {
            console.warn("[loadExample] failed to load example.json:", err);
          }
          editor.render();
          updateSnapIndicator();
        }
      }

      loadExample();
    </script>
  </body>
</html>
