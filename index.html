<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>html-overlay-node — Hybrid Canvas + HTML Visual Node Editor</title>

    <!-- SEO -->
    <meta name="description" content="html-overlay-node: a zero-dependency visual node editor that pairs Canvas performance with full HTML/CSS widgets. Build data-flow graphs, workflow editors, and visual-scripting tools in vanilla JS." />
    <meta name="keywords" content="visual node editor, canvas node editor, data flow graph, workflow editor, visual programming, flow-based programming, node graph library, html overlay, zero dependencies, litegraph alternative, rete alternative, javascript node editor" />
    <meta name="author" content="cheonghakim" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cheonghakim.github.io/HTML-overlay-node/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="html-overlay-node — Hybrid Canvas + HTML Visual Node Editor" />
    <meta property="og:description" content="Zero-dependency visual node editor. Canvas-speed rendering + full HTML/CSS widgets. Undo/redo, minimap, sub-graphs, TypeScript declarations included." />
    <meta property="og:url" content="https://cheonghakim.github.io/HTML-overlay-node/" />
    <meta property="og:site_name" content="html-overlay-node" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="html-overlay-node — Visual Node Editor" />
    <meta name="twitter:description" content="Zero-dependency visual node editor. Canvas rendering + HTML overlay widgets. Undo/redo, minimap, TypeScript support." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "html-overlay-node",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "description": "A zero-dependency visual node editor library that combines Canvas rendering performance with full HTML/CSS widget support for building data-flow graphs and workflow editors.",
      "url": "https://cheonghakim.github.io/HTML-overlay-node/",
      "downloadUrl": "https://www.npmjs.com/package/html-overlay-node",
      "codeRepository": "https://github.com/cheonghakim/html-overlay-node",
      "author": { "@type": "Person", "name": "cheonghakim" },
      "license": "https://opensource.org/licenses/MIT",
      "programmingLanguage": "JavaScript",
      "softwareVersion": "1.0.0"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./src/ui/PropertyPanel.css" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="icon" href="/img/favicon.svg" />
  </head>

  <body>
    <div id="wrap">
      <main class="content-root" id="graph-editor">
        <div id="menubar">
          <!-- File menu -->
          <div class="mb-group" id="mbFile">
            <button class="mb-item">File</button>
            <div class="mb-dropdown">
              <div class="mb-dd-item" id="saveBtn">
                <span>Save</span><span class="mb-shortcut">Ctrl+S</span>
              </div>
              <div class="mb-dd-item" id="loadBtn">
                <span>Load</span>
              </div>
            </div>
          </div>

          <!-- Edit menu -->
          <div class="mb-group" id="mbEdit">
            <button class="mb-item">Edit</button>
            <div class="mb-dropdown">
              <div class="mb-dd-item" id="undoBtn">
                <span>Undo</span><span class="mb-shortcut">Ctrl+Z</span>
              </div>
              <div class="mb-dd-item" id="redoBtn">
                <span>Redo</span><span class="mb-shortcut">Ctrl+Y</span>
              </div>
              <div class="mb-dd-sep"></div>
              <div class="mb-dd-item" id="copyBtn">
                <span>Copy</span><span class="mb-shortcut">Ctrl+C</span>
              </div>
              <div class="mb-dd-item" id="pasteBtn">
                <span>Paste</span><span class="mb-shortcut">Ctrl+V</span>
              </div>
              <div class="mb-dd-item" id="duplicateBtn">
                <span>Duplicate</span><span class="mb-shortcut">Ctrl+D</span>
              </div>
              <div class="mb-dd-sep"></div>
              <div class="mb-dd-item" id="selectAllBtn">
                <span>Select All</span><span class="mb-shortcut">Ctrl+A</span>
              </div>
              <div class="mb-dd-item" id="deleteSelBtn">
                <span>Delete Selected</span><span class="mb-shortcut">Del</span>
              </div>
            </div>
          </div>

          <!-- View menu -->
          <div class="mb-group" id="mbView">
            <button class="mb-item">View</button>
            <div class="mb-dropdown">
              <div class="mb-dd-item" id="fitBtn">
                <span>Fit to View</span><span class="mb-shortcut">F</span>
              </div>
              <div class="mb-dd-item" id="arrangeGridBtn">
                <span>Arrange Grid</span><span class="mb-shortcut">L</span>
              </div>
              <div class="mb-dd-item" id="arrangeRankHBtn">
                <span>Arrange Horizontal</span><span class="mb-shortcut">Alt+H</span>
              </div>
              <div class="mb-dd-item" id="arrangeRankVBtn">
                <span>Arrange Vertical</span><span class="mb-shortcut">Alt+V</span>
              </div>
              <div class="mb-dd-sep"></div>
              <div class="mb-dd-item" id="searchBtn">
                <span>Find Node</span><span class="mb-shortcut">Ctrl+K</span>
              </div>
              <div class="mb-dd-sep"></div>
              <div class="mb-dd-item" id="zoomInBtn">
                <span>Zoom In</span><span class="mb-shortcut">Ctrl++</span>
              </div>
              <div class="mb-dd-item" id="zoomOutBtn">
                <span>Zoom Out</span><span class="mb-shortcut">Ctrl+−</span>
              </div>
            </div>
          </div>

          <div class="mb-sep"></div>

          <!-- Edge style -->
          <label class="mb-label-group">
            <span class="mb-label">Edges</span>
            <select id="edgeStyleSelector" class="mb-select">
              <option value="bezier">Curved</option>
              <option value="orthogonal" selected>Orthogonal</option>
              <option value="line">Straight</option>
            </select>
          </label>

          <!-- Slots Layout -->
          <label class="mb-label-group">
            <span class="mb-label">Slots</span>
            <select id="slotLayoutSelector" class="mb-select">
              <option value="horizontal" selected>H</option>
              <option value="vertical">V</option>
            </select>
          </label>

          <div class="mb-sep"></div>

          <!-- Execution mode -->
          <div class="mode-toggle" id="modeToggle">
            <button class="active" data-mode="run" title="Run — execute all nodes continuously">Run</button>
            <button data-mode="step" title="Step — execute one step at a time">Step</button>
          </div>

          <div class="mb-sep"></div>

          <!-- Snap indicator -->
          <div class="indicator" id="snapIndicator" title="Toggle with G key">Snap</div>
        </div>
      </main>

      <!-- Node Search Spotlight (Ctrl+K) -->
      <div id="nodeSearch" class="node-search-overlay" role="dialog" aria-modal="true">
        <div class="node-search-panel">
          <div class="node-search-header">
            <svg class="node-search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="nodeSearchInput" class="node-search-input" type="text" placeholder="Search nodes…" autocomplete="off" spellcheck="false" />
            <span class="node-search-esc" id="nodeSearchClose">Esc</span>
          </div>
          <div id="nodeSearchResults" class="node-search-results"></div>
          <div class="node-search-footer">
            <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
            <span><kbd>↵</kbd> select</span>
            <span><kbd>Esc</kbd> close</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { createGraphEditor } from "./src/index.js";
      import { registerAllNodes } from "./src/nodes/index.js";

      const editor = createGraphEditor("#graph-editor", {
        theme: "dark",
        autorun: false,
        showMinimap: true,
        enablePropertyPanel: true,
        enableHelp: true,
      });

      window.editor = editor;

      registerAllNodes(editor.registry, editor.hooks);

      // ── Edge style ──────────────────────────────────────────────
      document.getElementById("edgeStyleSelector").addEventListener("change", (e) => {
        editor.setEdgeStyle(e.target.value);
        editor.render();
      });

      // ── Slots Layout ────────────────────────────────────────────
      document.getElementById("slotLayoutSelector").addEventListener("change", (e) => {
        editor.setSlotLayout(e.target.value);
      });

      // ── Execution mode ──────────────────────────────────────────
      const modeToggle = document.getElementById("modeToggle");
      modeToggle?.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const mode = btn.dataset.mode;
        editor.setExecutionMode(mode);
        modeToggle.querySelectorAll("button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });

      // ── Snap indicator ──────────────────────────────────────────
      const snapIndicator = document.getElementById("snapIndicator");

      function updateSnapIndicator() {
        if (!editor.controller) return;
        const on = editor.controller.snapToGrid;
        snapIndicator.textContent = on ? "Snap ON" : "Snap";
        snapIndicator.classList.toggle("active", on);
      }

      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "g" && !e.ctrlKey && !e.metaKey) {
          setTimeout(updateSnapIndicator, 10);
        }
      });

      // Patch render to sync snap indicator
      const _origRender = editor.render.bind(editor);
      editor.render = function () {
        _origRender();
        updateSnapIndicator();
      };

      // ── Fit to View ─────────────────────────────────────────────
      document.getElementById("fitBtn").addEventListener("click", () => {
        editor.controller?.fitToView();
      });

      // ── Grid Layout ─────────────────────────────────────────────
      document.getElementById("arrangeGridBtn").addEventListener("click", () => {
        editor.controller?.arrangeSelectionInGrid();
      });

      // ── Rank Layouts ────────────────────────────────────────────
      document.getElementById("arrangeRankHBtn").addEventListener("click", () => {
        editor.controller?.arrangeRankLayout("horizontal");
      });
      document.getElementById("arrangeRankVBtn").addEventListener("click", () => {
        editor.controller?.arrangeRankLayout("vertical");
      });

      // ── Zoom buttons ────────────────────────────────────────────
      document.getElementById("zoomInBtn").addEventListener("click", () => {
        const r = editor.renderer;
        r.zoomAt(1.2, r.width / 2, r.height / 2);
        editor.render();
      });

      document.getElementById("zoomOutBtn").addEventListener("click", () => {
        const r = editor.renderer;
        r.zoomAt(1 / 1.2, r.width / 2, r.height / 2);
        editor.render();
      });

      // ── Edit menu ───────────────────────────────────────────────
      document.getElementById("undoBtn").addEventListener("click", () => {
        editor.controller?.stack.undo();
        editor.render();
      });
      document.getElementById("redoBtn").addEventListener("click", () => {
        editor.controller?.stack.redo();
        editor.render();
      });
      document.getElementById("copyBtn").addEventListener("click", () => {
        editor.controller?._copySelection();
      });
      document.getElementById("pasteBtn").addEventListener("click", () => {
        editor.controller?._pasteClipboard();
      });
      document.getElementById("duplicateBtn").addEventListener("click", () => {
        editor.controller?._copySelection();
        editor.controller?._pasteClipboard();
      });
      document.getElementById("selectAllBtn").addEventListener("click", () => {
        const ctrl = editor.controller;
        if (!ctrl) return;
        ctrl.selection.clear();
        for (const node of editor.graph.nodes.values()) ctrl.selection.add(node.id);
        ctrl.render();
      });
      document.getElementById("deleteSelBtn").addEventListener("click", () => {
        editor.controller?._deleteSelection();
      });

      // ── Save / Load ─────────────────────────────────────────────
      function doSave() {
        const saved = editor.graph.toJSON();
        const blob = new Blob([JSON.stringify(saved, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "graph.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      document.getElementById("saveBtn").addEventListener("click", doSave);

      // Ctrl+S shortcut
      window.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
          e.preventDefault();
          doSave();
        }
      });

      document.getElementById("loadBtn").addEventListener("click", () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              editor.subNodePanel?.close();
              editor.graph.fromJSON(JSON.parse(ev.target.result));
              if (editor.htmlOverlay) editor.htmlOverlay.clear();
              requestAnimationFrame(() => {
                editor.controller?.fitToView({ padding: 80, maxScale: 1.5 });
                editor.render();
              });
            } catch (err) {
              console.error(err);
              alert("Failed to load file. Please check the JSON format.");
            }
          };
          reader.readAsText(file);
        });
        input.click();
      });

      // ── Initial load ────────────────────────────────────────────
      async function loadExample() {
        try {
          const exampleUrl = `${import.meta.env.BASE_URL}example.json`;
          const res = await fetch(exampleUrl);
          if (!res.ok) throw new Error("no example.json");
          const json = await res.json();
          editor.graph.fromJSON(json);

          // Frame 1: open sub-panel → mainArea CSS shrinks (right-docked).
          // Frame 2: ResizeObserver fires → canvas dimensions updated.
          // Frame 3: fitToView uses the final (narrowed) canvas size.
          requestAnimationFrame(() => {
            try {
              const sgNode = editor.graph.nodes.get("n-sg");
              if (sgNode && editor.subNodePanel) {
                editor.subNodePanel.open(sgNode, sgNode.state.subGraphData, [
                  "메인 그래프",
                  sgNode.title,
                ]);
              }
            } catch (err) {
              console.warn("[loadExample] sub-panel open failed:", err);
            }
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                editor.controller?.fitToView({ padding: 80, maxScale: 1.0 });
                updateSnapIndicator();
              });
            });
          });
        } catch (err) {
          if (err.message !== "no example.json") {
            console.warn("[loadExample] failed to load example.json:", err);
          }
          editor.render();
          updateSnapIndicator();
        }
      }

      // ── Node Search Spotlight (Ctrl+K) ──────────────────────────
      const searchOverlay = document.getElementById("nodeSearch");
      const searchInput   = document.getElementById("nodeSearchInput");
      const searchResults = document.getElementById("nodeSearchResults");
      let searchHlIdx = -1;

      function openSearch() {
        searchOverlay.classList.add("open");
        searchInput.value = "";
        searchHlIdx = -1;
        renderSearchResults("");
        setTimeout(() => searchInput.focus(), 0);
      }

      function closeSearch() {
        searchOverlay.classList.remove("open");
      }

      function renderSearchResults(query) {
        const q = query.toLowerCase().trim();
        const all = [...editor.graph.nodes.values()].filter(n => n.type !== "core/Group");
        const matches = q
          ? all.filter(n => n.title.toLowerCase().includes(q) || n.type.toLowerCase().includes(q))
          : all.slice(0, 8);

        searchResults.innerHTML = "";
        searchHlIdx = -1;

        if (matches.length === 0) {
          searchResults.innerHTML = '<div class="node-search-empty">No nodes found</div>';
          return;
        }

        for (const node of matches) {
          const def  = editor.registry.types.get(node.type);
          const color = def?.color || "#555";
          const item  = document.createElement("div");
          item.className = "node-search-item";
          item.dataset.nodeId = node.id;
          item.innerHTML =
            `<span class="node-search-dot" style="background:${color}"></span>` +
            `<span class="node-search-title">${node.title}</span>` +
            `<span class="node-search-type">${node.type.split("/").pop()}</span>`;
          item.addEventListener("click", () => {
            focusNode(node);
            closeSearch();
          });
          searchResults.appendChild(item);
        }
      }

      function focusNode(node) {
        editor.graph.updateWorldTransforms();
        editor.controller.selection.clear();
        editor.controller.selection.add(node.id);
        editor.controller._panToNode(node);
        editor.render();
      }

      function updateHighlight() {
        const items = searchResults.querySelectorAll(".node-search-item");
        items.forEach((el, i) => el.classList.toggle("highlighted", i === searchHlIdx));
        if (searchHlIdx >= 0) items[searchHlIdx]?.scrollIntoView({ block: "nearest" });
      }

      searchInput.addEventListener("input", e => renderSearchResults(e.target.value));

      searchInput.addEventListener("keydown", e => {
        const items = searchResults.querySelectorAll(".node-search-item");
        if (e.key === "ArrowDown") {
          e.preventDefault();
          searchHlIdx = Math.min(searchHlIdx + 1, items.length - 1);
          updateHighlight();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          searchHlIdx = Math.max(searchHlIdx - 1, 0);
          updateHighlight();
        } else if (e.key === "Enter") {
          if (searchHlIdx >= 0) items[searchHlIdx]?.click();
          else if (items.length > 0) items[0].click();
        } else if (e.key === "Escape") {
          closeSearch();
        }
      });

      searchOverlay.addEventListener("click", e => {
        if (e.target === searchOverlay) closeSearch();
      });

      document.getElementById("nodeSearchClose").addEventListener("click", closeSearch);
      document.getElementById("searchBtn").addEventListener("click", openSearch);

      window.addEventListener("keydown", e => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
          e.preventDefault();
          searchOverlay.classList.contains("open") ? closeSearch() : openSearch();
        }
      });

      loadExample();
    </script>
  </body>
</html>
